appId: com.vault.app
productName: Vault
copyright: Copyright © 2026 Kendrick-Oppong

directories:
  output: dist
  buildResources: build

files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!docs/*"
  - "!tests/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,eslint.config.mjs,.prettierignore,.prettierrc.json}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,postcss.config.cjs}"
  - "!{.editorconfig,.gitignore,.gitattributes}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{README.md,LICENSE}"

asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: Vault-${version}-Windows-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Vault
  differentialPackage: false

mac:
  category: public.app-category.utilities
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: Vault-${version}-macOS-Updater.${ext}

dmg:
  artifactName: Vault-${version}-macOS-Installer.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icon.png
  category: AudioVideo
  maintainer: Kendrick-Oppong
  artifactName: Vault-${version}-Linux-Installer.${ext}

publish:
  provider: github
  owner: Kendrick-Oppong
  repo: vault
