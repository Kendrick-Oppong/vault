name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter vault typecheck

  release:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build and package (macOS, unsigned)
        if: matrix.os == 'macos-latest'
        run: pnpm --filter vault ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build and package (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: pnpm --filter vault ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml
